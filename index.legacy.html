<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Unbounded:wght@700;900&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }

    body {
      background: #0a0a12;
      color: #e0e0f0;
      font-family: 'Space Mono', 'Courier New', monospace;
    }

    /* ── GRID ──────────────────────────────── */
    .grid-bg {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(rgba(0,255,200,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,200,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridPan 60s linear infinite;
    }
    @keyframes gridPan { from{background-position:0 0} to{background-position:40px 40px} }

    .scanlines {
      position: fixed; inset: 0; pointer-events: none; z-index: 1;
      background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,0.12) 3px, rgba(0,0,0,0.12) 4px);
    }

    /* corners */
    .corner { position: fixed; pointer-events: none; z-index: 2; width: 60px; height: 60px; }
    .corner-tl { top:16px; left:16px; border-top:2px solid #00ffc8; border-left:2px solid #00ffc8; }
    .corner-tr { top:16px; right:16px; border-top:2px solid #ff2d78; border-right:2px solid #ff2d78; }
    .corner-bl { bottom:16px; left:16px; border-bottom:2px solid #ff2d78; border-left:2px solid #ff2d78; }
    .corner-br { bottom:16px; right:16px; border-bottom:2px solid #00ffc8; border-right:2px solid #00ffc8; }

    .deco-text {
      position: fixed; pointer-events: none; z-index: 2;
      font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
      color: rgba(0,255,200,0.3);
    }
    .deco-tl { top:22px; left:82px; }
    .deco-tr { top:22px; right:82px; text-align:right; }
    .deco-bl { bottom:28px; left:82px; }
    .deco-br { bottom:28px; right:82px; text-align:right; }

    /* ── LAYOUT ────────────────────────────── */
    #app {
      position: relative; z-index: 10;
      width: 100vw; height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }

    /* ── BOOT TAG ──────────────────────────── */
    #boot-tag {
      font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
      color: #00ffc8; margin-bottom: 16px;
      min-height: 18px;
      opacity: 0; animation: fadeIn 0.8s 0.1s forwards;
    }
    #boot-tag::before { content: '▶  '; }
    #boot-cursor {
      display: inline-block; width: 7px; height: 12px;
      background: #00ffc8; margin-left: 2px; vertical-align: middle;
      animation: blink 0.7s step-start infinite;
    }

    /* ── CLOCK ─────────────────────────────── */
    #clock {
      font-family: 'Unbounded', 'Arial Black', sans-serif;
      font-size: clamp(72px, 11vw, 118px);
      font-weight: 900; line-height: 1; letter-spacing: -2px;
      color: #fff; position: relative;
      display: flex; align-items: baseline; justify-content: center;
      white-space: nowrap;
      opacity: 0; animation: glitchIn 0.6s 0.2s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    #clock-colon { color: #ff2d78; animation: blink 1s step-start infinite; font-family: 'Space Mono', 'Courier New', monospace; font-size: clamp(60px, 9vw, 100px); margin: 0 4px; }
    #clock-ampm {
      font-size: clamp(14px,2vw,20px); font-weight: 700;
      color: #00ffc8; margin-left: 10px; align-self: flex-start;
      padding-top: 12px; letter-spacing: 0.1em;
    }

    /* glitch layers */
    #clock-r, #clock-c {
      position: absolute; left: 0; top: 0; width: 100%;
      pointer-events: none; opacity: 0;
      font-family: 'Unbounded', 'Arial Black', sans-serif;
      font-size: clamp(72px, 11vw, 118px);
      font-weight: 900; line-height: 1; letter-spacing: -2px;
      white-space: nowrap; display: flex; align-items: baseline; justify-content: center;
    }
    #clock-r { color: #ff2d78; clip-path: polygon(0 0,100% 0,100% 38%,0 38%); animation: glitch1 6s 3s step-end infinite; }
    #clock-c { color: #00ffc8; clip-path: polygon(0 62%,100% 62%,100% 100%,0 100%); animation: glitch2 6s 3.8s step-end infinite; }

    @keyframes glitch1 {
      0%,88%,100%{transform:none;opacity:0}
      90%{transform:translate(-4px,0) skewX(-3deg);opacity:.75}
      92%{transform:translate(3px,0);opacity:.55}
      94%{transform:translate(-2px,0);opacity:.65}
      96%{transform:none;opacity:0}
    }
    @keyframes glitch2 {
      0%,88%,100%{transform:none;opacity:0}
      89%{transform:translate(4px,0) skewX(2deg);opacity:.65}
      91%{transform:translate(-3px,0);opacity:.45}
      93%{transform:none;opacity:0}
    }

    /* ── DATE ──────────────────────────────── */
    #date {
      font-size: 12px; letter-spacing: 0.25em; text-transform: uppercase;
      color: rgba(224,224,240,0.45); text-align: center; margin-top: 8px;
      opacity: 0; animation: fadeIn 0.8s 0.35s forwards;
    }

    /* ── GREETING ──────────────────────────── */
    #greeting {
      font-size: clamp(13px,1.5vw,16px); color: #00ffc8;
      margin-top: 16px; margin-bottom: 36px;
      letter-spacing: 0.12em; text-transform: uppercase; text-align: center;
      opacity: 0; animation: fadeIn 0.8s 0.45s forwards;
    }
    #greeting::before { content: '// '; color: rgba(0,255,200,0.35); }

    /* ── SEARCH ────────────────────────────── */
    #search-wrap {
      width: min(520px, 88vw); margin-bottom: 28px; position: relative;
      opacity: 0; animation: slideUp 0.7s 0.55s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    #search {
      width: 100%; padding: 14px 48px 14px 20px;
      font-family: 'Space Mono', 'Courier New', monospace; font-size: 15px;
      color: #e0e0f0; background: rgba(0,255,200,0.04);
      border: 1.5px solid rgba(0,255,200,0.35); border-radius: 0; outline: none;
      caret-color: #00ffc8; transition: border-color .2s, background .2s, box-shadow .2s;
    }
    #search::placeholder { color: rgba(224,224,240,0.3); }
    #search:focus {
      border-color: #00ffc8; background: rgba(0,255,200,0.07);
      box-shadow: 0 0 0 1px #00ffc8, 0 0 20px rgba(0,255,200,0.15), inset 0 0 20px rgba(0,255,200,0.04);
    }
    #search-cursor {
      position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
      color: #00ffc8; animation: blink 1s step-start infinite;
      font-size: 18px; line-height: 1; pointer-events: none;
    }

    /* ── SHORTCUTS ─────────────────────────── */
    #shortcuts {
      display: flex; gap: 0;
      border: 1.5px solid rgba(255,45,120,0.4);
      opacity: 0; animation: slideUp 0.7s 0.68s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .shortcut {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 20px;
      font-family: 'Space Mono', 'Courier New', monospace;
      font-size: 13px; font-weight: 700; letter-spacing: 0.08em;
      color: rgba(224,224,240,0.75); text-decoration: none;
      background: transparent;
      border-right: 1.5px solid rgba(255,45,120,0.4);
      position: relative; transition: color .15s; white-space: nowrap; overflow: hidden;
    }
    .shortcut:last-child { border-right: none; }
    .shortcut::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,45,120,0.12), rgba(0,255,200,0.08));
      opacity: 0; transition: opacity .2s;
    }
    .shortcut:hover { color: #fff; }
    .shortcut:hover::before { opacity: 1; }
    .shortcut .num { font-size: 10px; color: #ff2d78; margin-right: 2px; font-weight: 400; }

    /* ── STATUS BAR ────────────────────────── */
    #status-bar {
      position: fixed; bottom: 0; left: 0; right: 0; height: 28px;
      display: flex; align-items: center; padding: 0 80px;
      background: rgba(10,10,18,0.95); border-top: 1px solid rgba(0,255,200,0.2);
      font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
      color: rgba(0,255,200,0.4); gap: 30px; z-index: 50;
    }
    .status-item { display: flex; align-items: center; gap: 6px; }
    .status-dot { width:5px; height:5px; border-radius:50%; background:#00ffc8; animation: pulse 2s ease-in-out infinite; }

    /* ── TWEAKS PANEL ──────────────────────── */
    #tweaks-panel {
      position: fixed; bottom: 40px; left: 24px;
      background: rgba(10,10,18,0.97);
      border: 1.5px solid rgba(0,255,200,0.4);
      padding: 18px 22px; min-width: 260px;
      font-family: 'Space Mono', monospace; z-index: 200;
      box-shadow: 0 0 40px rgba(0,255,200,0.1);
      display: none;
      max-height: 80vh; overflow-y: auto;
    }
    #tweaks-panel h3 { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.25em; color:#00ffc8; margin-bottom:14px; }
    .tweak-row { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:9px; }
    .tweak-row label { font-size:11px; color:rgba(224,224,240,0.5); white-space:nowrap; }
    .tweak-input {
      font-family:'Space Mono','Courier New',monospace; font-size:11px; padding:5px 8px;
      background:rgba(0,255,200,0.05); border:1px solid rgba(0,255,200,0.3);
      color:#e0e0f0; width:140px;
    }
    .tweak-sep { border:none; border-top:1px solid rgba(255,45,120,0.2); margin:8px 0; }

    /* ── CRT FLASH ─────────────────────────── */
    #crt-flash { position:fixed; inset:0; z-index:999; pointer-events:none; opacity:0; }
    #crt-flash.fire { animation: crtFlash 0.18s step-end forwards; }
    @keyframes crtFlash {
      0%  {opacity:0;background:transparent}
      8%  {opacity:1;background:rgba(255,45,120,.12);transform:translateY(-3px) skewX(-1deg)}
      16% {opacity:1;background:rgba(0,255,200,.10);transform:translateY(3px) skewX(1deg)}
      25% {opacity:.7;background:rgba(255,255,255,.06);transform:translateY(-1px)}
      35% {opacity:1;background:rgba(255,45,120,.08);transform:translateY(2px)}
      50% {opacity:.5;background:rgba(0,0,0,.15);transform:none}
      80% {opacity:.3;background:transparent}
      100%{opacity:0;background:transparent}
    }
    body.rgb-split { animation: rgbSplit 0.18s step-end forwards; }
    @keyframes rgbSplit {
      0%  {filter:none}
      15% {filter:drop-shadow(3px 0 0 rgba(255,45,120,.6)) drop-shadow(-3px 0 0 rgba(0,255,200,.6))}
      35% {filter:drop-shadow(-4px 0 0 rgba(255,45,120,.4)) drop-shadow(4px 0 0 rgba(0,255,200,.4))}
      55% {filter:drop-shadow(2px 0 0 rgba(255,45,120,.3))}
      100%{filter:none}
    }
    #tear-lines { position:fixed; inset:0; z-index:998; pointer-events:none; overflow:hidden; }
    .tear { position:absolute; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,rgba(0,255,200,.5) 30%,rgba(255,45,120,.5) 60%,transparent); opacity:0; }
    .tear.active { animation: tearSlide 0.12s step-end forwards; }
    @keyframes tearSlide {
      0%  {opacity:0;transform:translateX(0)}
      20% {opacity:1;transform:translateX(-20px)}
      40% {opacity:.7;transform:translateX(15px)}
      60% {opacity:1;transform:translateX(-8px)}
      80% {opacity:.4;transform:translateX(4px)}
      100%{opacity:0;transform:translateX(0)}
    }
    #greeting.jitter { animation: greetJitter 0.15s step-end forwards; }
    @keyframes greetJitter {
      0%  {transform:none;color:#00ffc8}
      25% {transform:translate(-5px,0) skewX(-3deg);color:#ff2d78}
      50% {transform:translate(5px,1px);color:#fff}
      75% {transform:translate(-2px,0);color:#00ffc8}
      100%{transform:none;color:#00ffc8}
    }

    /* ── ANIMS ─────────────────────────────── */
    @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0.1} }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    @keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes glitchIn {
      0%  {opacity:0;transform:skewX(-8deg) scale(.97)}
      60% {opacity:1;transform:skewX(2deg)}
      80% {transform:skewX(-1deg)}
      100%{opacity:1;transform:none}
    }
    @keyframes bootGlitch {
      0%  {opacity:1;transform:none}
      20% {opacity:0;transform:translate(4px,0) skewX(-5deg)}
      40% {opacity:1;transform:translate(-3px,0);color:#ff2d78}
      60% {opacity:.5;transform:translate(2px,0)}
      80% {opacity:1;transform:none;color:#00ffc8}
      100%{opacity:1;transform:none}
    }

    /* ── TOOLS HUB ──────────────────────────── */
    #tools-btn {
      position: fixed; top: 84px; right: 16px; z-index: 20;
      font-family: 'Space Mono', 'Courier New', monospace;
      font-size: 11px; font-weight: 700; letter-spacing: 0.15em;
      color: #ff2d78; background: rgba(10,10,18,0.92);
      border: 1.5px solid #ff2d78; padding: 5px 12px;
      cursor: pointer; text-transform: uppercase;
      transition: color .15s, background .15s, box-shadow .15s;
    }
    #tools-btn:hover { color:#fff; background:rgba(255,45,120,0.18); box-shadow:0 0 14px rgba(255,45,120,0.4); }
    #tools-overlay {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.87); backdrop-filter: blur(3px);
      display: none; align-items: center; justify-content: center;
    }
    #tools-overlay.open { display: flex; }
    #tools-modal {
      background: #0a0a12; border: 1.5px solid #00ffc8;
      box-shadow: 0 0 60px rgba(0,255,200,0.15), 0 0 120px rgba(0,255,200,0.05);
      width: min(780px, 96vw); max-height: 92vh; overflow-y: auto;
      font-family: 'Space Mono', 'Courier New', monospace;
    }
    #tools-header {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 16px; border-bottom: 1px solid rgba(0,255,200,0.2); flex-wrap: wrap;
    }
    #tools-title { font-size:11px; letter-spacing:0.25em; text-transform:uppercase; color:#00ffc8; flex-shrink:0; }
    #tools-tabs { display: flex; }
    .ttab {
      font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(224,224,240,0.45); background: transparent;
      border: 1px solid rgba(255,45,120,0.3); border-right: none;
      padding: 5px 14px; cursor: pointer; transition: color .15s, background .15s;
    }
    .ttab:last-child { border-right: 1px solid rgba(255,45,120,0.3); }
    .ttab:hover { color: rgba(224,224,240,0.8); background: rgba(255,45,120,0.08); }
    .ttab.active { color: #ff2d78; background: rgba(255,45,120,0.12); border-color: rgba(255,45,120,0.7); }
    .ttab.active + .ttab { border-left-color: rgba(255,45,120,0.7); }
    #tools-close {
      font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.1em;
      color: #ff2d78; background: transparent; border: 1px solid rgba(255,45,120,0.5);
      padding: 3px 9px; cursor: pointer; transition: background .15s, color .15s; margin-left: auto;
    }
    #tools-close:hover { background: rgba(255,45,120,0.15); color: #fff; }
    .tools-pane { display: none; padding: 18px; }
    .tools-pane.active { display: block; }
    /* shared form elements */
    .tf { display: flex; flex-direction: column; gap: 4px; }
    .tf label { font-size:9px; letter-spacing:0.22em; text-transform:uppercase; color:rgba(0,255,200,0.45); }
    .tf input[type="text"], .tf select {
      font-family: 'Space Mono', 'Courier New', monospace; font-size: 12px;
      padding: 7px 9px; background: rgba(0,255,200,0.04);
      border: 1px solid rgba(0,255,200,0.28); color: #e0e0f0; outline: none;
      transition: border-color .2s; width: 100%;
    }
    .tf input[type="text"]:focus, .tf select:focus { border-color: #00ffc8; }
    .tf select { background-color: rgba(0,255,200,0.04); }
    .tf select option { background: #0a0a12; }
    .tsep { border: none; border-top: 1px solid rgba(255,45,120,0.18); margin: 4px 0; }
    .tbtn {
      font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(224,224,240,0.7); background: transparent;
      border: 1px solid rgba(0,255,200,0.3); padding: 6px 12px; cursor: pointer;
      transition: color .15s, background .15s, border-color .15s; white-space: nowrap;
    }
    .tbtn:hover { color: #fff; background: rgba(0,255,200,0.08); border-color: #00ffc8; }
    .tbtn.accent { color: #0a0a12; background: #00ffc8; border-color: #00ffc8; }
    .tbtn.accent:hover { background: #00e6b4; box-shadow: 0 0 16px rgba(0,255,200,0.35); }
    .tbtn.accent:disabled { background:rgba(0,255,200,0.2); color:rgba(224,224,240,0.3); cursor:default; box-shadow:none; border-color:transparent; }
    .tbtn.pink { color: #ff2d78; border-color: rgba(255,45,120,0.4); }
    .tbtn.pink:hover { background: rgba(255,45,120,0.1); border-color: #ff2d78; color: #fff; }
    /* password pane */
    .pwd-modes { display: flex; margin-bottom: 14px; }
    .pwd-mode-tab {
      font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(224,224,240,0.45); background: transparent;
      border: 1px solid rgba(0,255,200,0.25); border-right: none;
      padding: 5px 14px; cursor: pointer; transition: color .15s, background .15s;
    }
    .pwd-mode-tab:last-child { border-right: 1px solid rgba(0,255,200,0.25); }
    .pwd-mode-tab.active { color: #00ffc8; background: rgba(0,255,200,0.08); border-color: #00ffc8; }
    #pwd-output-wrap { display: flex; gap: 8px; margin-bottom: 8px; }
    #pwd-output {
      flex: 1; font-family: 'Space Mono', monospace; font-size: 13px;
      padding: 10px 12px; background: rgba(0,255,200,0.04);
      border: 1px solid rgba(0,255,200,0.28); color: #fff;
      letter-spacing: 0.06em; word-break: break-all;
      min-height: 46px; display: flex; align-items: center;
      cursor: text; user-select: all;
    }
    #pwd-strength-bar { height: 3px; background: rgba(255,255,255,0.08); margin-bottom: 4px; }
    #pwd-strength-fill { height: 100%; width: 0; transition: width .3s, background .3s; }
    #pwd-strength-label { font-size: 9px; letter-spacing: 0.2em; color: rgba(224,224,240,0.4); margin-bottom: 12px; }
    .pwd-slider-row { display: flex; align-items: center; gap: 10px; }
    .pwd-slider-row label { font-size:9px; letter-spacing:0.18em; text-transform:uppercase; color:rgba(0,255,200,0.45); min-width:56px; }
    .pwd-slider-row input[type="range"] { flex: 1; accent-color: #00ffc8; cursor: pointer; }
    .pwd-slider-val { font-size: 11px; color: #00ffc8; min-width: 24px; text-align: right; }
    .pwd-toggles { display: flex; gap: 6px; flex-wrap: wrap; }
    .pwd-toggle {
      font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700;
      letter-spacing: 0.1em; padding: 5px 10px; cursor: pointer;
      border: 1px solid rgba(0,255,200,0.25); background: transparent;
      color: rgba(224,224,240,0.45); transition: all .15s; text-transform: uppercase;
    }
    .pwd-toggle.on { color: #00ffc8; border-color: #00ffc8; background: rgba(0,255,200,0.08); }
    #pwd-random-opts { display: flex; flex-direction: column; gap: 10px; }
    #pwd-phrase-opts { display: none; flex-direction: column; gap: 10px; }
    .pwd-sep-row { display: flex; align-items: center; gap: 10px; }
    .pwd-sep-row label { font-size:9px; letter-spacing:0.18em; text-transform:uppercase; color:rgba(0,255,200,0.45); min-width:56px; }
    .pwd-sep-row select { font-family:'Space Mono',monospace; font-size:11px; padding:5px 8px; background:rgba(0,255,200,0.04); border:1px solid rgba(0,255,200,0.28); color:#e0e0f0; outline:none; }
    .pwd-sep-row select option { background: #0a0a12; }
    #pwd-actions { display: flex; gap: 8px; margin-top: 6px; }
    /* qr pane */
    .qr-body { display: flex; gap: 20px; flex-wrap: wrap; }
    #qr-controls { flex: 0 0 240px; display: flex; flex-direction: column; gap: 9px; }
    .qr-colors { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .qr-color-item { display: flex; flex-direction: column; gap: 3px; align-items: center; }
    .qr-color-item label { font-size:9px; letter-spacing:0.15em; text-transform:uppercase; color:rgba(0,255,200,0.4); }
    .qr-color-item input[type="color"] { width:100%; height:28px; border:1px solid rgba(0,255,200,0.28); background:transparent; cursor:pointer; padding:2px; }
    #qr-logo-wrap { display: flex; flex-direction: column; gap: 4px; }
    #qr-logo-wrap > label { font-size:9px; letter-spacing:0.22em; text-transform:uppercase; color:rgba(0,255,200,0.45); }
    #qr-logo-input { font-family:'Space Mono',monospace; font-size:10px; color:rgba(224,224,240,0.55); background:rgba(0,255,200,0.03); border:1px solid rgba(0,255,200,0.22); padding:5px 8px; width:100%; cursor:pointer; }
    #qr-logo-input::file-selector-button { font-family:'Space Mono',monospace; font-size:10px; background:rgba(0,255,200,0.07); border:1px solid rgba(0,255,200,0.3); color:#00ffc8; padding:3px 8px; cursor:pointer; margin-right:8px; letter-spacing:0.08em; }
    #qr-preview-area {
      flex: 1; min-width: 260px; display: flex; flex-direction: column;

    .color-fmt-val { flex:1; font-family:'Space Mono',monospace; font-size:11px; padding:5px 8px; background:rgba(0,255,200,0.04); border:1px solid rgba(0,255,200,0.22); color:#e0e0f0; outline:none; }
    .color-input-row { display:flex; gap:8px; align-items:center; margin-top:10px; }
    .color-input-row input[type="color"] { width:38px; height:34px; border:1px solid rgba(0,255,200,0.28); background:transparent; cursor:pointer; padding:2px; flex-shrink:0; }

    #color-input:focus { border-color: #00ffc8; }
    #color-input.invalid { border-color: #ff2d78; }
  </style>
</head>

<script src="https://unpkg.com/qr-code-styling@1.6.0/lib/qr-code-styling.js"></script>
<script>
// ── DEFAULTS ──────────────────────────────────────────
const DEFAULTS = {
  name: 'chigy',
  l1: 'YouTube',  u1: 'https://youtube.com',
  l2: 'GitHub',   u2: 'https://github.com',
  l3: 'Mail',     u3: 'https://mail.google.com',
  l4: 'Work',     u4: 'https://www.chigy.dev',
};

function loadCfg() {
  try { return Object.assign({}, DEFAULTS, JSON.parse(localStorage.getItem('y2k_cfg') || '{}')); }
  catch { return {...DEFAULTS}; }
}
function saveCfg(cfg) { localStorage.setItem('y2k_cfg', JSON.stringify(cfg)); }

let cfg = loadCfg();

// ── HELPERS ───────────────────────────────────────────
const $ = id => document.getElementById(id);
const pad = n => String(n).padStart(2,'0');
const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ── ICON SVGs ─────────────────────────────────────────
const ICONS = {
  youtube: `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.8 8s-.2-1.4-.8-2c-.7-.8-1.5-.8-1.9-.9C16.5 5 12 5 12 5s-4.5 0-7.1.2c-.4 0-1.2.1-1.9.9-.6.6-.8 2-.8 2S2 9.6 2 11.2v1.6c0 1.6.2 3.2.2 3.2s.2 1.4.8 2c.7.8 1.6.8 2 .9C7 19 12 19 12 19s4.5 0 7.1-.2c.4 0 1.2-.1 1.9-.9.6-.6.8-2 .8-2s.2-1.6.2-3.2v-1.6c0-1.6-.2-3.2-.2-3.2z"/><path d="M10 15l5-3-5-3v6z"/></svg>`,
  github:  `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>`,
  mail:    `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>`,
  link:    `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>`,
  code:    `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>`,
};

function guessIcon(label, url) {
  const s = (label + url).toLowerCase();
  if (s.includes('youtube') || s.includes('yt')) return ICONS.youtube;
  if (s.includes('github')) return ICONS.github;
  if (s.includes('mail') || s.includes('outlook') || s.includes('gmail')) return ICONS.mail;
  if (s.includes('code') || s.includes('dev') || s.includes('arch')) return ICONS.code;
  return ICONS.link;
}

// ── RENDER SHORTCUTS ──────────────────────────────────
function renderShortcuts() {
  const wrap = $('shortcuts');
  wrap.innerHTML = '';
  [1,2,3,4].forEach(n => {
    const label = cfg['l'+n], url = cfg['u'+n];
    const a = document.createElement('a');
    a.className = 'shortcut';
    a.href = url;
    a.innerHTML = `<span class="num">0${n}</span>${guessIcon(label, url)}<span>${label}</span>`;
    wrap.appendChild(a);
  });
}

// ── CLOCK ─────────────────────────────────────────────
function updateClock() {
  const d = new Date();
  let h = d.getHours();
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  const hStr = pad(h), mStr = pad(d.getMinutes());
  const timeStr = hStr + ':' + mStr;

  $('clock-h').textContent = hStr;
  $('clock-m').textContent = mStr;
  $('clock-ampm').textContent = ampm;
  $('clock-r').textContent = timeStr;
  $('clock-c').textContent = timeStr;

  // date
  $('date').textContent =
    `${DAYS[d.getDay()].toUpperCase()} ${MONTHS[d.getMonth()].toUpperCase()} ${d.getDate()} ${d.getFullYear()}`;

  // greeting
  const name = cfg.name || 'friend';
  const day = d.getDay(), hour = d.getHours();
  let gr;
  if (day === 5 && hour >= 16) gr = `happy_friday(${name})`;
  else if (hour < 5)  gr = `late_night_session(${name})`;
  else if (hour < 12) gr = `good_morning(${name})`;
  else if (hour < 18) gr = `good_afternoon(${name})`;
  else                gr = `good_evening(${name})`;
  $('greeting').textContent = gr;

  // deco seconds
  $('deco-seconds').textContent =
    `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}
updateClock();
setInterval(updateClock, 1000);

// ── SEARCH ────────────────────────────────────────────
const searchEl = $('search');
const cursorEl = $('search-cursor');
searchEl.addEventListener('input', () => {
  cursorEl.style.display = searchEl.value ? 'none' : '';
});
searchEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && searchEl.value.trim())
    window.location.href = `https://www.google.com/search?q=${encodeURIComponent(searchEl.value.trim())}`;
});

// ── BOOT MESSAGES ─────────────────────────────────────
const BOOT_MSGS = [
  'SYSTEM::READY','CAFFEINE::LOW','VIBE::NOMINAL','TODO::PENDING',
  'BRAIN::BUFFERING','TABS::MULTIPLYING','FOCUS::LOST','SNACKS::DEPLETED',
  'MOTIVATION::LOADING','SLEEP::OPTIONAL','COFFEE::REQUIRED','BUG::FEATURES',
  'DISTRACTION::INCOMING','PRODUCTIVITY::404','CHAOS::MANAGED',
  'DEADLINE::IMMINENT','PROCRASTINATION::ACTIVE','GALAXY_BRAIN::ENGAGED',
  'MONDAY::DETECTED','FRIDAY::ACQUIRED',
];
let bootIdx = 0, bootPos = 0, bootPhase = 'typing';

function bootTick() {
  const msg = BOOT_MSGS[bootIdx];
  const el = $('boot-text');
  if (bootPhase === 'typing') {
    if (bootPos < msg.length) {
      bootPos++;
      el.textContent = msg.slice(0, bootPos);
      setTimeout(bootTick, 45);
    } else {
      bootPhase = 'holding';
      setTimeout(bootTick, 2800);
    }
  } else if (bootPhase === 'holding') {
    // glitch flash
    const tag = $('boot-tag');
    tag.style.animation = 'bootGlitch 0.12s step-end';
    setTimeout(() => tag.style.animation = '', 130);
    bootPhase = 'deleting';
    setTimeout(bootTick, 200);
  } else {
    if (bootPos > 0) {
      bootPos--;
      el.textContent = msg.slice(0, bootPos);
      setTimeout(bootTick, 25);
    } else {
      bootIdx = (bootIdx + 1) % BOOT_MSGS.length;
      bootPhase = 'typing';
      setTimeout(bootTick, 100);
    }
  }
}
bootTick();

// ── CRT GLITCH ────────────────────────────────────────
function fireGlitch() {
  ['tear-a','tear-b','tear-c'].forEach(id => {
    const t = $(id);
    t.style.top = (10 + Math.random() * 80) + 'vh';
    t.classList.remove('active');
    void t.offsetWidth;
    t.classList.add('active');
    setTimeout(() => t.classList.remove('active'), 200);
  });
  const flash = $('crt-flash');
  flash.classList.remove('fire'); void flash.offsetWidth; flash.classList.add('fire');
  setTimeout(() => flash.classList.remove('fire'), 250);
  document.body.classList.add('rgb-split');
  setTimeout(() => document.body.classList.remove('rgb-split'), 250);
  const gr = $('greeting');
  gr.classList.add('jitter');
  setTimeout(() => gr.classList.remove('jitter'), 200);
  setTimeout(fireGlitch, 12000 + Math.random() * 22000);
}
setTimeout(fireGlitch, 12000 + Math.random() * 10000);

// ── TWEAKS ────────────────────────────────────────────
function syncTweakInputs() {
  $('t-name').value = cfg.name;
  [1,2,3,4].forEach(n => {
    $('t-l'+n).value = cfg['l'+n];
    $('t-u'+n).value = cfg['u'+n];
  });
}

function onTweakChange() {
  cfg.name = $('t-name').value;
  [1,2,3,4].forEach(n => {
    cfg['l'+n] = $('t-l'+n).value;
    cfg['u'+n] = $('t-u'+n).value;
  });
  saveCfg(cfg);
  renderShortcuts();
  updateClock();
}

['t-name','t-l1','t-u1','t-l2','t-u2','t-l3','t-u3','t-l4','t-u4'].forEach(id => {
  $(id).addEventListener('input', onTweakChange);
});

// host messaging for design tool tweaks toggle
window.addEventListener('message', e => {
  if (e.data?.type === '__activate_edit_mode')   $('tweaks-panel').style.display = 'block';
  if (e.data?.type === '__deactivate_edit_mode') $('tweaks-panel').style.display = 'none';
});
window.parent.postMessage({ type: '__edit_mode_available' }, '*');

// ── INIT ──────────────────────────────────────────────
syncTweakInputs();
renderShortcuts();

// ── TOOLS HUB ─────────────────────────────────────────
(function () {

  // open / close
  function openTools() { $('tools-overlay').classList.add('open'); }
  function closeTools() { $('tools-overlay').classList.remove('open'); }
  $('tools-btn').addEventListener('click', openTools);
  $('tools-close').addEventListener('click', closeTools);
  $('tools-overlay').addEventListener('click', e => { if (e.target === $('tools-overlay')) closeTools(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && $('tools-overlay').classList.contains('open')) closeTools(); });

  // tab switching
  document.querySelectorAll('.ttab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.ttab').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tools-pane').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      $('tab-' + btn.dataset.tab).classList.add('active');
    });
  });

  // ══ PASSWORD GENERATOR ════════════════════════════════
  const CU = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const CL = 'abcdefghijklmnopqrstuvwxyz';
  const CN = '0123456789';
  const CS = '!@#$%^&*()-_=+[]{}|;:,.<>?';
  const WORDS = ['able','acid','aged','also','area','army','back','ball','band','bank','base','bath','bear','beat','bell','best','bill','bird','blow','blue','boat','body','bond','bone','book','born','burn','call','calm','card','care','cash','cave','chip','city','clap','clay','clip','club','coal','coat','code','coin','cold','copy','cord','core','corn','cost','crew','dark','data','dawn','dead','deal','dear','deck','deep','desk','dire','dish','disk','door','dose','draw','drop','drum','dusk','dust','duty','earn','east','edge','evil','face','fact','fail','fair','fall','fame','farm','fast','fate','feel','file','fill','film','find','fire','firm','fish','flag','flat','flow','foam','fold','fond','font','food','fool','ford','form','fort','free','fuel','full','fund','fuse','gain','game','gaze','gear','glow','gone','good','grab','gray','grid','grin','grip','grow','gulf','half','hall','halt','hand','hang','hard','harm','head','heal','heap','hear','heat','help','hero','hide','high','hill','hint','hold','hole','home','hook','hope','horn','huge','hull','hunt','hurt','idle','iron','jail','join','jump','just','keen','keep','kind','king','knee','knew','know','lack','lake','land','lane','last','late','lead','leaf','lean','leap','left','lend','less','life','lift','like','lime','line','link','list','live','load','lock','lone','long','loop','lore','lose','lost','loud','love','luck','made','mail','main','make','mall','mark','mask','mass','meal','mean','meet','melt','menu','mesh','mile','milk','mill','mind','mint','miss','mode','most','move','much','must','myth','nail','name','near','need','news','next','nice','none','noon','norm','note','oath','once','only','open','pace','pack','page','paid','pain','pale','palm','park','part','pass','past','path','peak','peer','pick','pine','pipe','plan','play','plot','plug','pole','pond','pool','port','post','pour','prey','pull','pump','pure','push','rack','rain','rank','rare','rate','read','real','reed','reef','rent','rest','rice','rich','ride','ring','rise','road','rock','role','roll','roof','room','root','rope','rose','rule','rush','rust','safe','sage','sail','salt','same','sand','save','scan','seal','seen','self','send','ship','shop','shot','show','shut','sick','side','sing','sink','site','size','skin','skip','slam','slim','slip','slot','slow','snap','snow','soar','sock','soft','soil','song','soon','sort','soul','soup','span','spin','spot','step','stop','suit','sure','surf','swap','tail','tale','tall','task','team','term','test','text','tick','tide','tile','till','time','tiny','tire','toll','tone','tool','torn','tour','town','tree','trim','trip','true','tube','tune','twin','type','upon','used','user','vary','vast','view','void','vote','wait','walk','wall','warn','warp','wave','wear','weed','well','went','west','wide','wife','wild','will','wind','wine','wing','wire','wise','wolf','wood','word','work','wrap','year','zero','zone','zoom'];

  let pwdMode = 'random';
  const tog = { upper:true, lower:true, num:true, sym:false, cap:false, num2:false };

  const rInt  = n => Math.floor(Math.random() * n);
  const rPick = s => s[rInt(s.length)];

  function genRandom() {
    const len = +$('pwd-len').value;
    let pool = '';
    if (tog.upper) pool += CU;
    if (tog.lower) pool += CL;
    if (tog.num)   pool += CN;
    if (tog.sym)   pool += CS;
    if (!pool) pool = CL;
    const must = [];
    if (tog.upper) must.push(rPick(CU));
    if (tog.lower) must.push(rPick(CL));
    if (tog.num)   must.push(rPick(CN));
    if (tog.sym)   must.push(rPick(CS));
    const chars = [...must];
    for (let i = 0; i < len - must.length; i++) chars.push(rPick(pool));
    for (let i = chars.length - 1; i > 0; i--) { const j = rInt(i+1); [chars[i],chars[j]] = [chars[j],chars[i]]; }
    return chars.join('');
  }

  function genPassphrase() {
    const wc = +$('pwd-wc').value, sep = $('pwd-sep').value;
    let words = Array.from({length: wc}, () => rPick(WORDS));
    if (tog.cap) words = words.map(w => w[0].toUpperCase() + w.slice(1));
    let out = words.join(sep);
    if (tog.num2) out += sep + rInt(1000);
    return out;
  }

  function updateStrength(pwd) {
    let s = 0;
    if (pwd.length >= 8)  s++;
    if (pwd.length >= 14) s++;
    if (pwd.length >= 20) s++;
    if (/[A-Z]/.test(pwd)) s++;
    if (/[a-z]/.test(pwd)) s++;
    if (/[0-9]/.test(pwd)) s++;
    if (/[^A-Za-z0-9]/.test(pwd)) s++;
    const levels = [
      {color:'#ff2d78',text:'WEAK'},{color:'#ff2d78',text:'WEAK'},
      {color:'#ff8c42',text:'FAIR'},{color:'#ff8c42',text:'FAIR'},
      {color:'#ffd700',text:'MODERATE'},{color:'#00ffc8',text:'STRONG'},
      {color:'#00ffc8',text:'STRONG'},{color:'#00ffc8',text:'VERY_STRONG'},
    ];
    const {color, text} = levels[Math.min(s, 7)];
    $('pwd-strength-fill').style.cssText = `width:${Math.min(100,s*15)}%;background:${color}`;
    $('pwd-strength-label').textContent = 'STRENGTH::' + text;
    $('pwd-strength-label').style.color = color;
  }

  function generatePwd() {
    const pwd = pwdMode === 'random' ? genRandom() : genPassphrase();
    $('pwd-output').textContent = pwd;
    updateStrength(pwd);
  }

  document.querySelectorAll('.pwd-mode-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.pwd-mode-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      pwdMode = btn.dataset.mode;
      $('pwd-random-opts').style.display = pwdMode === 'random' ? 'flex' : 'none';
      $('pwd-phrase-opts').style.display  = pwdMode === 'phrase'  ? 'flex' : 'none';
      generatePwd();
    });
  });

  $('pwd-len').addEventListener('input', () => { $('pwd-len-val').textContent = $('pwd-len').value; generatePwd(); });
  $('pwd-wc').addEventListener('input',  () => { $('pwd-wc-val').textContent  = $('pwd-wc').value;  generatePwd(); });
  $('pwd-sep').addEventListener('change', generatePwd);

  [['tog-upper','upper'],['tog-lower','lower'],['tog-num','num'],['tog-sym','sym'],['tog-cap','cap'],['tog-num2','num2']].forEach(([id, key]) => {
    $(id).addEventListener('click', () => { tog[key] = !tog[key]; $(id).classList.toggle('on', tog[key]); generatePwd(); });
  });

  $('pwd-regen').addEventListener('click', generatePwd);
  $('pwd-copy').addEventListener('click', () => {
    const t = $('pwd-output').textContent;
    if (!t) return;
    navigator.clipboard.writeText(t).then(() => {
      const b = $('pwd-copy'); b.textContent = 'COPIED'; setTimeout(() => b.textContent = 'COPY', 1200);
    });
  });

  generatePwd();

  // ══ QR CODE ════════════════════════════════════════════
  let qrCode = null, qrLogoData = null;

  function qrOpts() {
    return {
      width: 280, height: 280, type: 'canvas',
      data: $('qr-text').value.trim() || 'https://chigy.dev',
      image: qrLogoData || undefined,
      dotsOptions: { color: $('qr-dot-color').value, type: $('qr-dot-style').value },
      backgroundOptions: { color: $('qr-bg-color').value },
      cornersSquareOptions: { type: $('qr-corner-style').value, color: $('qr-corner-color').value },
      cornersDotOptions: { color: $('qr-corner-color').value },
      imageOptions: { crossOrigin: 'anonymous', margin: 5 },
    };
  }

  function renderQr() {
    const prev = $('qr-preview-area'), ph = $('qr-placeholder'), dl = $('qr-download');
    if (!$('qr-text').value.trim()) {
      qrCode = null; prev.innerHTML = ''; prev.appendChild(ph); dl.disabled = true; return;
    }
    if (ph.parentNode === prev) ph.remove();
    dl.disabled = false;
    if (typeof QRCodeStyling === 'undefined') return;
    if (!qrCode) { qrCode = new QRCodeStyling(qrOpts()); prev.innerHTML = ''; qrCode.append(prev); }
    else qrCode.update(qrOpts());
  }

  ['qr-text','qr-dot-style','qr-corner-style'].forEach(id => $(id).addEventListener('input', renderQr));
  ['qr-dot-color','qr-bg-color','qr-corner-color'].forEach(id => $(id).addEventListener('input', renderQr));

  $('qr-logo-input').addEventListener('change', e => {
    const f = e.target.files[0];
    if (!f) { qrLogoData = null; renderQr(); return; }
    const r = new FileReader();
    r.onload = ev => { qrLogoData = ev.target.result; renderQr(); };
    r.readAsDataURL(f);
  });
  $('qr-clear-logo').addEventListener('click', () => { qrLogoData = null; $('qr-logo-input').value = ''; renderQr(); });
  $('qr-download').addEventListener('click', () => { if (qrCode) qrCode.download({ name: 'qr_code', extension: 'png' }); });

  // ══ COLOR PICKER ═══════════════════════════════════════
  let cc = { r: 255, g: 45, b: 120 };

  function hexToRgb(hex) {
    const m = hex.replace('#','').match(/^([0-9a-f]{3}|[0-9a-f]{6})$/i);
    if (!m) return null;
    let h = m[0];
    if (h.length === 3) h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
    return { r: parseInt(h.slice(0,2),16), g: parseInt(h.slice(2,4),16), b: parseInt(h.slice(4,6),16) };
  }

  function rgbToHsl(r, g, b) {
    r /= 255; g /= 255; b /= 255;
    const max = Math.max(r,g,b), min = Math.min(r,g,b), l = (max+min)/2;
    if (max === min) return { h:0, s:0, l: Math.round(l*100) };
    const d = max - min, s = l > 0.5 ? d/(2-max-min) : d/(max+min);
    let h;
    switch (max) {
      case r: h = ((g-b)/d + (g<b?6:0)) / 6; break;
      case g: h = ((b-r)/d + 2) / 6; break;
      default: h = ((r-g)/d + 4) / 6;
    }
    return { h: Math.round(h*360), s: Math.round(s*100), l: Math.round(l*100) };
  }

  const toHex = (r,g,b) => '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');

  function parseColor(str) {
    str = str.trim();
    if (/^#?[0-9a-f]{3,6}$/i.test(str)) return hexToRgb(str.startsWith('#') ? str : '#'+str);
    const rm = str.match(/rgba?\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)/i);
    if (rm) return { r:+rm[1], g:+rm[2], b:+rm[3] };
    const hm = str.match(/hsla?\(\s*(\d+)\s*,\s*(\d+)%?\s*,\s*(\d+)%?/i);
    if (hm) {
      const [hh, ss, ll] = [+hm[1], +hm[2]/100, +hm[3]/100];
      const a = ss * Math.min(ll, 1-ll);
      const f = n => { const k = (n + hh/30) % 12; return Math.round((ll - a*Math.max(-1, Math.min(k-3, 9-k, 1))) * 255); };
      return { r:f(0), g:f(8), b:f(4) };
    }
    return null;
  }

  function updateColorUI() {
    const { r, g, b } = cc, hex = toHex(r,g,b), hsl = rgbToHsl(r,g,b);
    $('color-swatch').style.background = hex;
    $('color-hex-val').value = hex;
    $('color-rgb-val').value = `rgb(${r}, ${g}, ${b})`;
    $('color-hsl-val').value = `hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)`;
    $('color-native').value = hex;
    $('color-input').classList.remove('invalid');
  }

  $('color-input').addEventListener('input', () => {
    const c = parseColor($('color-input').value);
    if (c) { cc = c; updateColorUI(); } else $('color-input').classList.add('invalid');
  });
  $('color-native').addEventListener('input', () => {
    const c = hexToRgb($('color-native').value);
    if (c) { cc = c; $('color-input').value = toHex(c.r,c.g,c.b); updateColorUI(); }
  });

  document.querySelectorAll('[data-copy]').forEach(btn => {
    btn.addEventListener('click', () => {
      const map = { hex:'color-hex-val', rgb:'color-rgb-val', hsl:'color-hsl-val' };
      navigator.clipboard.writeText($(map[btn.dataset.copy]).value).then(() => {
        const o = btn.textContent; btn.textContent = 'COPIED'; setTimeout(() => btn.textContent = o, 1200);
      });
    });
  });

  $('color-eyedrop').addEventListener('click', () => {
    if (!window.EyeDropper) {
      $('color-eyedrop').textContent = 'NO_SUPPORT';
      setTimeout(() => $('color-eyedrop').textContent = 'EYEDROP', 2000);
      return;
    }
    new EyeDropper().open().then(res => {
      const c = hexToRgb(res.sRGBHex);
      if (c) { cc = c; $('color-input').value = toHex(c.r,c.g,c.b); updateColorUI(); }
    }).catch(() => {});
  });

  updateColorUI();

})();
</script>
</body>
